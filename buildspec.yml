version: 0.2

env:
  variables:
    TERRAFORM_VERSION: "1.12.2"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "REGION=$AWS_DEFAULT_REGION  IMAGE=$IMAGE_URI"
      - aws sts get-caller-identity
      - echo ">> install Terraform"
      - curl -fsSL https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip -o tf.zip
      - unzip -q tf.zip && mv terraform /usr/local/bin/
      - terraform -version
      - echo ">> install kubectl"
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl && mv kubectl /usr/local/bin/
      - kubectl version --client
      - echo ">> install Python deps"
      - pip install --no-cache-dir python-terraform
  pre_build:
    commands:
      - echo ">> terraform init"
      - terraform -chdir=crawl_infrastructure init
  build:
    commands:
      - echo ">> run cluster_manager.py with ACTION=$ACTION CLUSTERS=$CLUSTERS"
      - ls -alR crawl_infrastructure | head -20   # ← added debug listing
      - python crawl_infrastructure/cluster_manager.py
artifacts:
  files:
    - '**/*.log'
cache:
  paths:
    - '/root/.terraform/**/*'
